[buildout]

extends =
    https://raw.githubusercontent.com/collective/buildout.plonetest/master/test-6.1.x.cfg
    base.cfg

#update-versions-file = test-6.1.cfg

auto-checkout +=
    collective.contact.core
    collective.contact.widget
    collective.documentgenerator
    collective.eeafaceted.z3ctable
    collective.excelexport
    collective.js.tooltipster
    plone.formwidget.masterselect


[sources]
collective.contact.core = git ${remotes:col}/collective.contact.core.git pushurl=${remotes:col_push}/collective.contact.core.git branch=python3
collective.contact.widget = git ${remotes:col}/collective.contact.widget.git pushurl=${remotes:col_push}/collective.contact.widget.git branch=python3
collective.documentgenerator = git ${remotes:col}/collective.documentgenerator.git pushurl=${remotes:col_push}/collective.documentgenerator.git
collective.eeafaceted.z3ctable = git ${remotes:col}/collective.eeafaceted.z3ctable.git pushurl=${remotes:col_push}/collective.eeafaceted.z3ctable.git branch=plone6
collective.excelexport = git ${remotes:col}/collective.excelexport.git pushurl=${remotes:col_push}/collective.excelexport.git branch=plone6
collective.js.tooltipster = git ${remotes:col}/collective.js.tooltipster.git pushurl=${remotes:col_push}/collective.js.tooltipster.git branch=plone61
plone.formwidget.masterselect = git ${remotes:col}/plone.formwidget.masterselect.git pushurl=${remotes:col_push}/plone.formwidget.masterselect.git branch=plone6_compatibility


[versions]
# to keep prompt-toolkit < 3
ipython = 8.3.0

ipdb = 0.13.9
iw.debug = 0.3
jedi = 0.18.1
parso = 0.8.3
pdbp = 1.7.0

# Required by:
# ipdb
asttokens = 2.0.8
backcall = 0.2.0
executing = 1.1.1
matplotlib-inline = 0.1.6
pexpect = 4.8.0
pickleshare = 0.7.5
ptyprocess = 0.7.0
pure-eval = 0.2.2
stack-data = 0.5.1
traitlets = 5.4.0

five.localsitemanager = 4.0
five.intid = 2.0.1
five.customerize = 3.0.0
five.grok = 3.0
z3c.form = 5.2
z3c.relationfield = 2.0.0
z3c.objpath = 2.1
z3c.pt = 4.5
z3c.caching = 3.1
z3c.zcmlhook = 2.1
z3c.formwidget.query = 2.1
z3c.table = 3.0
z3c.batching = 3.1
z3c.unconfigure = 2.1
